<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link rel="stylesheet" href="style.css">
        <title>RHS EV Grand Prix</title>
    </head>

    <body>
        <!--Main Logo-->
        <div class="image-container">
        <img src="/images/EVGPlogo.png"   alt="Rocktown High School Electic Vehicle Grand Prix logo">
            </div>

        <!--Links aboutUs-->
      <div class="flex-container">  
        <a href="aboutUs/aboutUs.html">
         <button class="flex-btn">
            <label for="aboutus">About Us</label>
         </button>
         </a>
         <!--Our team button-->
         <a href="aboutUs/ourTeam.html">
        <button class="flex-btn">
            <label for="ourteam">Our Team</label>
         </button>
         </a>
         <!--our car button-->
         <a href="aboutUs/ourCar.html">
         <button class="flex-btn">
            <label for="ourcar">Our Car</label>
         </button>
         </a>
         <!--Our sponsors button-->
         <a href="aboutUs/ourSponsors.html">
         <button class="flex-btn">
            <label for="oursponsors">Our Sponsors</label>
         </button>
         </a>
         <!--Become a sponsor button-->
         <a href="aboutUs/becomeSposor.html">
            <button class="flex-btn">
                <label for="becomesponsor">Become a Sponsor</label>
            </button>
         </a>
         <!-- Calendar button-->
         <a href="aboutUs/calendar">
            <button class="flex-btn">
                <label for="calendar">Calendar</label>
            </button>
         </a>
       </div>  
         <!--If we need another page, add it in the same way as shown above with a button
             If we need a button that is has different css qualities, use a div tag to seperate it-->

        
        <p>Welcome to the Rocktown High School Electric Vehicle Grand Prix website!  </p>
        
            <!--Image Slideshow-->
            
            <div class="carousel">
                <div class="slides">
                    <!--Must add images-->
                    
                    <img src="images/img1.jpg" height="400px" class="active" alt="Slide 1">
                    <img src="images/img2.jpg" height="400px" alt="Slide 2">
                    <img src="images/img3.jpg" height="400px" alt="Slide 3">
                        
                    <!--Continue adding more images in the same way-->

                </div>
                <div class="flex-container">
                <button id="prevBtn" onclick="changeSlide(-1)">←</button>
                <button id="nextBtn" onclick="changeSlide(1)">→</button>
                </div>
            </div>
            <script src="script.js"></script>
    </body>
</html>
