<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link rel="stylesheet" href="style.css">
        <title>RHS EV Grand Prix</title>
    </head>

    <body>
        <!--Main Logo-->
        <img src="/images/EVGPlogo.png"  float="left" alt="Rocktown High School Electic Vehicle Grand Prix logo">

        <!--Links aboutUs-->
        <a href="aboutUs.html">
         <button>
            <label for="aboutus">About Us</label>
         </button>
         </a>
         <!--Our team button-->
         <a href="ourTeam.html">
        <button>
            <label for="ourteam">Our Team</label>
         </button>
         </a>
         <!--our car button-->
         <a href="ourCar.html">
         <button>
            <label for="ourcar">Our Car</label>
         </button>
         </a>
         <!--Our sponsors button-->
         <a href="ourSponsors.html">
         <button>
            <label for="oursponsors">Our Sponsors</label>
         </button>
         </a>

        
        <p>Welcome to the Rocktown High School Electric Vehicle Grand Prix website!  </p>
        <label for="About Us">About Us</label>
        <select name="About Us" id="About Us">
            
            
            <option value="Our Team">Our Team</option>    
            <option value="Our Car">Our Car</option>
            <option value="Our Sponsors">Our Sponsors</option>
            </select>
            <!--Image Slideshow-->
            <div class="carousel">
                <div class="slides">
                    <!--Must add images-->
                    <img src="images/img1.JPEG" height="300" class="active" alt="Slide 1">
                    <img src="images/img2.JPEG" height="300" alt="Slide 2">
                    <img src="images/img3.JPEG" height="300" alt="Slide 3">
                    <!--Continue adding more images in the same way-->

                </div>
                <button id="prevBtn" onclick=""changeSlide(-1)>←</button>
                <button id="nextBtn" onclick=""changeSlide(1)>→</button>
            </div>
    </body>
</html>
